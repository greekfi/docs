name: Deploy docs

# Source-of-truth for greekfi/docs is this repo. On push to main:
#   1. Build the Docusaurus site.
#   2. Deploy to GitHub Pages (https://docs.greek.fi).
#
# Generated content (e.g. docs/api.md from forge-doc) is contributed by
# the `regenerate-api-reference` workflow in greekfi/protocol — it opens
# PRs against this repo when contracts change. Merging those PRs lands a
# normal commit on main, which retriggers this workflow and republishes.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
