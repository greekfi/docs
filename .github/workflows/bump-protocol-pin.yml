name: Bump pin in protocol

# On every push to docs main, open (or update) a PR in greekfi/protocol
# that bumps the `docs` submodule pin to the new SHA. Merging that PR
# changes the gitlink, which triggers protocol's docs.yml workflow →
# forge doc + gen-reference + Docusaurus build + Pages deploy.
#
# Why this lives here (and not in protocol):
#   The publish pipeline must run where both repos are present, because
#   docs/scripts/gen-reference.mjs reads `forge doc` output from
#   protocol/foundry/. So protocol owns the publish step; this repo
#   only has to tell protocol "bump the pin and re-publish."
#
# Setup:
#   greekfi/docs > Settings > Secrets and variables > Actions
#   → add secret `PROTOCOL_BUMP_PAT`:
#     - PAT (classic) with `repo` scope, OR
#     - Fine-grained PAT scoped to greekfi/protocol with
#       `Contents: Read and write` and `Pull requests: Read and write`.
#     - Owner of the PAT must have permission to open PRs on protocol.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: bump-protocol-pin
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout greekfi/protocol main
        uses: actions/checkout@v6
        with:
          repository: greekfi/protocol
          token: ${{ secrets.PROTOCOL_BUMP_PAT }}
          ref: main
          submodules: false
          fetch-depth: 0

      - name: Bump docs submodule to latest greekfi/docs main
        run: |
          git -c url."https://github.com/".insteadOf="git@github.com:" \
            submodule update --init docs
          git -C docs fetch origin main
          git -C docs checkout origin/main

      - name: Open PR bumping the pin
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PROTOCOL_BUMP_PAT }}
          # Single rolling branch — re-running the workflow updates the
          # same PR with the latest docs SHA instead of opening a new
          # one each time.
          branch: bump-docs-pin
          base: main
          add-paths: docs
          commit-message: |
            Bump docs submodule

            Auto-generated by greekfi/docs CI after push to main.
          author: greekfi-docs-bot <actions@users.noreply.github.com>
          committer: greekfi-docs-bot <actions@users.noreply.github.com>
          title: "Bump docs submodule"
          body: |
            Auto-bump of the `docs/` submodule to the latest greekfi/docs main.

            Triggered by push to greekfi/docs:
            ${{ github.event.repository.html_url }}/commit/${{ github.sha }}

            Merging this PR will trigger the docs deploy workflow
            (`.github/workflows/docs.yml`) and publish to GitHub Pages.
          labels: docs, automated
          delete-branch: true
